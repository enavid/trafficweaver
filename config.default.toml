# ─────────────────────────────────────────────
#  TrafficWeaver – Default Configuration
#  Copy to config.toml and customize as needed.
# ─────────────────────────────────────────────

[server]
host = "0.0.0.0"
port = 8099
secret_key = "change-me-in-production"

[auth]
username = "admin"
# bcrypt hash of "admin" — change via UI after first login
password_hash = "$2b$12$LJ3m4ys3Lk8Bw.qTm8V5zuY9C3kFm5cGmZ9GfKr6hKj6sDvNxJlW"

[traffic]
# Daily download target in bytes (default 10 GB)
daily_target_bytes = 10737418240
# Allowed variance around daily target (0.20 = +/-20%)
daily_variance = 0.20

[traffic.schedule]
# Activity weight per 6-hour window [00-06, 06-12, 12-18, 18-24]
# Must sum to approximately 1.0
weights = [0.05, 0.30, 0.35, 0.30]

[traffic.download]
# Maximum simultaneous file downloads
max_concurrent = 2
# Download speed cap per file in bytes/sec (0 = unlimited)
speed_cap_bps = 2097152
# Probability of pausing a download mid-way (0.0 to 1.0)
pause_probability = 0.3
# Pause duration range in seconds [min, max]
pause_range = [15, 120]

[traffic.browsing]
# Seconds to wait between page visits [min, max]
delay_range = [8, 75]
# Max internal links to follow per page (0 = landing page only)
max_internal_links = 3
# Browsing depth: 1 = landing + links, 2 = follow sub-links, 3 = one more level
browse_depth = 2
# Use real Chromium browser via Playwright (true) or lightweight HTTP (false)
use_playwright = false

[network]
# IP address of the network interface to use for outbound traffic (empty = default)
bind_ip = ""
# Name of the network interface to use (e.g. "eth0", "Wi-Fi")
interface = ""

[timezone]
name = "Asia/Tehran"
offset = 3.5

[logging]
level = "INFO"
file = "logs/trafficweaver.log"
